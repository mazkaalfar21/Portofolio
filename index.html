  <style>

    html {
      scroll-behavior: smooth;
    }
    /* ========== GLOBAL STYLES (Terpisah dari HTML) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #faf9f8;
      color: #1e1e2a;
      overflow-x: hidden;
      line-height: 1.5;
    }

    h1, h2, h3, h4, .font-heading {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Natural Color Palette */
    :root {
      --primary: #2c3e4e;
      --primary-soft: #3e5a6c;
      --accent: #cb7b3c;
      --accent-muted: #d9935c;
      --light-bg: #faf9f8;
      --card-bg: #ffffff;
      --border-light: #e9ecef;
      --text-dark: #1e2a36;
      --text-muted: #5c6f87;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Noise texture halus (tidak berlebihan) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ========== NAVBAR ========== */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(250, 249, 248, 0.94);
      backdrop-filter: blur(12px);
      z-index: 100;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .nav-link {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      color: #4a5b6e;
      transition: color 0.2s ease;
      letter-spacing: -0.2px;
      text-decoration: none;
    }
    .nav-link:hover { color: var(--accent); }

    /* Buttons */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: white;
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover {
      background: var(--primary-soft);
      transform: translateY(-2px);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: 1px solid #cbd5e1;
      color: #2c3e4e;
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(203, 123, 60, 0.05);
      transform: translateY(-2px);
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 1.25rem;
      transition: all 0.25s ease;
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: #d4dce4;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.08);
    }

    /* Skill Badges */
    .skill-badge {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      background: #f1f5f9;
      color: #2c3e4e;
      transition: all 0.2s;
      border: 1px solid #e2e8f0;
    }
    .skill-badge.learning {
      background: #fef9e8;
      color: #cb7b3c;
      border-color: #ffe3c6;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 6px;
      border-radius: 8px;
      background: var(--accent);
      width: 0%;
    }

    /* Project card */
    .project-card {
      background: white;
      border-radius: 1.25rem;
      overflow: hidden;
      border: 1px solid #edf2f7;
      transition: all 0.25s;
    }
    .project-card:hover {
      border-color: #d1dbe6;
      transform: translateY(-6px);
    }
    .project-img {
      width: 100%;
      height: 200px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    @media (max-width: 640px) {
      .project-img {
        height: 160px;
    }
    }
    .project-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Certificate */
    .cert-card {
      background: white;
      border-radius: 1rem;
      padding: 1.25rem;
      display: flex;
      gap: 1rem;
      border: 1px solid #ebf0f5;
      transition: all 0.2s;
    }
    .cert-card:hover {
      border-color: #cb7b3c40;
      background: #fefaf6;
    }

    /* Hero elements */
    .hero-tag {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      background: #eef2f6;
      color: #3e5a6c;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      display: inline-block;
    }
    .hero-title {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .stat-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--primary);
    }

    /* Profile frame - GAMPANG DIGANTI */
    .profile-frame {
      position: relative;
      width: 280px;
      height: 360px;
    }
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
      border: 1px solid #eef2f8;
    }

    .floating-card {
      background: white;
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid #edf2f7;
    }

    .section-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      background: #fef3e9;
      display: inline-block;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
    }
    .section-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 0.75rem;
      margin-bottom: 1rem;
    }

    /* Reveal Animation */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .cursor-glow {
      position: fixed;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(203,123,60,0.04) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    footer {
      border-top: 1px solid #e2e8f0;
      background: #ffffff;
    }
    @media (max-width: 768px) {
      .profile-frame { width: 220px; height: 280px; }
      .hero-title { font-size: 3rem; }
    }
  </style>
</head>

<script>
  // Cursor & Animations
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
  function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
  const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } }); }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  // Active nav highlight
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('.nav-link');
  window.addEventListener('scroll', () => {
    let current = '';
    sections.forEach(s => { if(window.scrollY >= s.offsetTop - 120) current = s.getAttribute('id'); });
    navLinks.forEach(l => { l.style.color = (l.getAttribute('href') === '#' + current) ? '#cb7b3c' : '#4a5b6e'; });
  });
  // Optional: profile image bisa diganti dengan URL gambar asli. Cukup ganti src pada img.profile-img
</script>
